<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnoMedia - AI Video Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero-section { padding: 80px 0; text-align: center; background: #212529; color: white; }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="container">
            <h1 class="display-4 fw-bold">InnoMedia Agent</h1>
            <p class="lead">Hệ thống tự động hóa Video Affiliate bằng AI</p>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <form id="videoForm" method="POST">
                            {% csrf_token %} 
                            
                            <div class="mb-3">
                                <label for="urlInput" class="form-label fw-bold">Dán Link Sản Phẩm (Shopee/Tiki/Web):</label>
                                <input type="url" class="form-control form-control-lg" id="urlInput" name="url" placeholder="https://..." required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">🚀 Tạo Video Ngay</button>
                        </form>
                        
                        <div id="resultMessage" class="mt-4 text-center"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('videoForm').onsubmit = async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const resultDiv = document.getElementById('resultMessage');
            
            // 1. Tìm và lấy mã bảo mật mà Django đã giấu trong form
            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
            
            resultDiv.innerHTML = '<span class="text-warning">⏳ Đang đẩy yêu cầu vào hàng đợi Celery...</span>';
            
            // 2. Gắn mã bảo mật vào Headers khi gửi đi
            const response = await fetch('', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrfToken // Trình thẻ cho bảo vệ Django
                },
                body: formData
            });
            const data = await response.json();
            
            if(data.status === 'success') {
                resultDiv.innerHTML = `<span class="text-success fw-bold">✅ Đã tiếp nhận! Task ID: ${data.task_id}</span><br><small>Hãy mở Terminal của Celery lên để xem hệ thống đang chạy ngầm nhé!</small>`;
            } else {
                resultDiv.innerHTML = `<span class="text-danger fw-bold">❌ Lỗi: ${data.message}</span>`;
            }
        };
    </script>
</body>
</html>
